- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    state: restarted
  when: not ansible_check_mode

- name: apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true
  when: not ansible_check_mode

- name: restart wireguard forwarding service
  ansible.builtin.systemd:
    name: wireguard-forwarding.service
    state: restarted
    daemon_reload: true
  when: not ansible_check_mode
