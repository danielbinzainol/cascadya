<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} - Control Plane IAM</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0c1117;
            --panel: #141c26;
            --panel-2: #1b2633;
            --line: #304255;
            --text: #eff7ff;
            --muted: #9eb1c5;
            --accent: #7dd3a6;
            --accent-2: #82b4ff;
            --danger: #ff8c8c;
            --warn: #f5c76b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(125, 211, 166, 0.18), transparent 35%),
                radial-gradient(circle at top right, rgba(130, 180, 255, 0.16), transparent 28%),
                var(--bg);
            color: var(--text);
        }

        .shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 20px 64px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .brand {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .brand span { color: var(--accent); }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .card {
            background: linear-gradient(180deg, rgba(20, 28, 38, 0.95), rgba(20, 28, 38, 0.88));
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.25);
        }

        .grid {
            display: grid;
            gap: 18px;
        }

        .grid.two {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .eyebrow {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.78rem;
            margin-bottom: 12px;
        }

        h1, h2, h3 {
            margin: 0 0 12px;
            line-height: 1.15;
        }

        p {
            color: var(--muted);
            line-height: 1.6;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            padding: 7px 12px;
            border: 1px solid var(--line);
            background: rgba(130, 180, 255, 0.08);
            color: var(--text);
            font-size: 0.92rem;
        }

        .badge.admin {
            background: rgba(125, 211, 166, 0.12);
        }

        .badge.warn {
            background: rgba(245, 199, 107, 0.12);
        }

        .list {
            margin: 0;
            padding-left: 18px;
            color: var(--muted);
        }

        .list li {
            margin: 8px 0;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: #0b1219;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 16px;
            font-size: 0.98rem;
        }

        button, .button {
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 11px 15px;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            color: #081019;
            background: linear-gradient(135deg, var(--accent), #c1f1d8);
        }

        .button.secondary, button.secondary {
            background: transparent;
            color: var(--text);
            border-color: var(--line);
        }

        .error {
            color: var(--danger);
            margin: 0 0 14px;
        }

        .notice {
            margin: 0 0 14px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: rgba(125, 211, 166, 0.12);
            color: var(--text);
        }

        .notice.warn {
            background: rgba(245, 199, 107, 0.12);
        }

        .helper {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table td, .table th {
            text-align: left;
            vertical-align: top;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(48, 66, 85, 0.45);
        }

        .field-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .field-row > * {
            flex: 1 1 220px;
        }

        code, pre {
            font-family: "Cascadia Mono", "Consolas", monospace;
        }

        pre {
            margin: 0;
            padding: 16px;
            border-radius: 14px;
            background: #0a1015;
            border: 1px solid var(--line);
            overflow-x: auto;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="nav">
            <div class="brand">Control Plane <span>IAM Foundation</span></div>
            <div class="actions">
                {% if user %}
                <a class="button secondary" href="/ui/app">Dashboard</a>
                {% if 'user:read' in user.permissions %}
                <a class="button secondary" href="/ui/admin">Utilisateurs</a>
                {% endif %}
                <span class="badge">{{ user.display_name }}</span>
                <span class="badge {% if user.auth_source == 'legacy' %}warn{% elif user.is_admin %}admin{% endif %}">
                    {{ user.auth_source }}
                </span>
                <form method="post" action="/auth/logout">
                    <button class="secondary" type="submit">Logout</button>
                </form>
                {% endif %}
            </div>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
