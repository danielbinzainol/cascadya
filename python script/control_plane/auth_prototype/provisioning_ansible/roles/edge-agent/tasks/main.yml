---
- name: Install edge-agent OS dependencies
  ansible.builtin.apt:
    name: "{{ edge_agent_apt_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create persistent Cascadya data directory
  ansible.builtin.file:
    path: "{{ cascadya_data_dir }}"
    state: directory
    owner: "{{ edge_agent_service_user }}"
    group: "{{ edge_agent_service_user }}"
    mode: "0750"

- name: Create edge-agent runtime directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ edge_agent_service_user }}"
    group: "{{ edge_agent_service_user }}"
    mode: "{{ item.mode }}"
  loop: "{{ edge_agent_directories }}"
  loop_control:
    label: "{{ item.path }}"

- name: Check per-device client certificates on the controller
  ansible.builtin.stat:
    path: "{{ edge_agent_local_cert_dir }}/{{ item.filename }}"
  delegate_to: localhost
  become: false
  loop: "{{ edge_agent_dynamic_cert_specs }}"
  loop_control:
    label: "{{ item.filename }}"
  register: edge_agent_local_cert_stats

- name: Fail when per-device client certificates are missing on the controller
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isreg
    fail_msg: >-
      Missing {{ item.item.filename }} in {{ edge_agent_local_cert_dir }} on the
      Ansible controller.
  loop: "{{ edge_agent_local_cert_stats.results }}"
  loop_control:
    label: "{{ item.item.filename }}"

- name: Check optional per-device CA certificate on the controller
  ansible.builtin.stat:
    path: "{{ edge_agent_local_cert_dir }}/{{ edge_agent_local_ca_cert_filename }}"
  delegate_to: localhost
  become: false
  register: edge_agent_local_ca_cert_stat

- name: Check optional per-device NATS server CA certificate on the controller
  ansible.builtin.stat:
    path: "{{ edge_agent_local_cert_dir }}/{{ edge_agent_local_nats_server_ca_cert_filename }}"
  delegate_to: localhost
  become: false
  register: edge_agent_local_nats_server_ca_cert_stat

- name: Select edge-agent CA certificate source
  ansible.builtin.set_fact:
    edge_agent_ca_cert_src: >-
      {{
        (edge_agent_local_cert_dir ~ '/' ~ edge_agent_local_nats_server_ca_cert_filename)
        if edge_agent_local_nats_server_ca_cert_stat.stat.exists
        else (
          (edge_agent_local_cert_dir ~ '/' ~ edge_agent_local_ca_cert_filename)
          if edge_agent_local_ca_cert_stat.stat.exists
        else edge_agent_static_ca_cert_src
        )
      }}

- name: Deploy edge-agent Python sources
  ansible.builtin.copy:
    src: "src/agent/{{ item }}"
    dest: "{{ edge_agent_app_dir }}/{{ item }}"
    owner: "{{ edge_agent_service_user }}"
    group: "{{ edge_agent_service_user }}"
    mode: "0644"
  loop: "{{ edge_agent_source_files }}"
  register: edge_agent_source_copy

- name: Deploy edge-agent Python requirements
  ansible.builtin.copy:
    src: src/requirements.txt
    dest: "{{ edge_agent_app_dir }}/requirements.txt"
    owner: "{{ edge_agent_service_user }}"
    group: "{{ edge_agent_service_user }}"
    mode: "0644"
  register: edge_agent_requirements_copy

- name: Deploy CA certificate
  ansible.builtin.copy:
    src: "{{ edge_agent_ca_cert_src }}"
    dest: "{{ edge_agent_certs_dir }}/ca.crt"
    owner: "{{ edge_agent_service_user }}"
    group: "{{ edge_agent_service_user }}"
    mode: "0600"
  register: edge_agent_ca_cert_copy

- name: Deploy per-device client certificates
  ansible.builtin.copy:
    src: "{{ edge_agent_local_cert_dir }}/{{ item.filename }}"
    dest: "{{ edge_agent_certs_dir }}/{{ item.filename }}"
    owner: "{{ edge_agent_service_user }}"
    group: "{{ edge_agent_service_user }}"
    mode: "{{ item.mode }}"
  loop: "{{ edge_agent_dynamic_cert_specs }}"
  loop_control:
    label: "{{ item.filename }}"
  no_log: true
  register: edge_agent_dynamic_certs_copy

- name: Install edge-agent Python dependencies in the virtual environment
  ansible.builtin.pip:
    requirements: "{{ edge_agent_app_dir }}/requirements.txt"
    virtualenv: "{{ edge_agent_venv_dir }}"
    virtualenv_command: "{{ edge_agent_virtualenv_command }}"
    state: present
  become_user: "{{ edge_agent_service_user }}"
  register: edge_agent_python_dependencies

- name: Deploy edge-agent systemd units
  ansible.builtin.template:
    src: "{{ item }}.service.j2"
    dest: "{{ edge_agent_systemd_dir }}/{{ item }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ edge_agent_services }}"
  register: edge_agent_systemd_units_copy

- name: Collect systemd service facts
  ansible.builtin.service_facts:

- name: Stop and disable the legacy MQTT edge-agent service
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop: "{{ edge_agent_legacy_services }}"
  when: item in ansible_facts.services

- name: Remove legacy edge-agent systemd units
  ansible.builtin.file:
    path: "{{ edge_agent_systemd_dir }}/{{ item }}"
    state: absent
  loop: "{{ edge_agent_legacy_services }}"

- name: Ensure edge-agent services are enabled and started
  ansible.builtin.systemd:
    name: "{{ item }}.service"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ edge_agent_services }}"

- name: Restart edge-agent services when the deployment changes
  ansible.builtin.systemd:
    name: "{{ item }}.service"
    state: restarted
  loop: "{{ edge_agent_services }}"
  when: >-
    edge_agent_source_copy is changed or
    edge_agent_requirements_copy is changed or
    edge_agent_ca_cert_copy is changed or
    edge_agent_dynamic_certs_copy is changed or
    edge_agent_python_dependencies is changed or
    edge_agent_systemd_units_copy is changed
