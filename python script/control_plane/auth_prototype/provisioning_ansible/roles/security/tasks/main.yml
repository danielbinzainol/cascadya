---
- name: Install UFW
  apt:
    name: ufw
    state: present

- name: Allow SSH
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow WireGuard VPN
  ufw:
    rule: allow
    port: "{{ wireguard_port }}"
    proto: udp

- name: Enable Firewall (Default Deny)
  ufw:
    state: enabled
    policy: deny