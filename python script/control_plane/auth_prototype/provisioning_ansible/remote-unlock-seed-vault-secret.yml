---
- name: Seed the remote unlock secret in Vault through the broker inventory
  hosts: remote_unlock_broker
  become: false
  gather_facts: false

  vars:
    remote_unlock_broker_vault_token_env_var_effective: >-
      {{ remote_unlock_broker_vault_token_env_var | default('REMOTE_UNLOCK_BROKER_VAULT_TOKEN') }}
    remote_unlock_vault_secret_field: secret
    remote_unlock_vault_secret_force: false
    remote_unlock_vault_secret_payload: >-
      {{
        {}
        | combine({ (remote_unlock_vault_secret_field): (remote_unlock_vault_secret_value | string) })
      }}
    remote_unlock_vault_secret_api_url: >-
      {{
        (remote_unlock_broker_vault_addr | regex_replace('/+$', ''))
        ~ '/v1/'
        ~ remote_unlock_broker_vault_kv_mount
        ~ '/data/'
        ~ (remote_unlock_broker_vault_kv_prefix | regex_replace('^/+|/+$', ''))
        ~ '/'
        ~ remote_unlock_device_id
      }}

  tasks:
    - name: Resolve the broker Vault token from vars or environment
      ansible.builtin.set_fact:
        remote_unlock_broker_vault_token_effective: >-
          {{
            remote_unlock_broker_vault_token
            if (remote_unlock_broker_vault_token | default('') | length > 0)
            else lookup('ansible.builtin.env', remote_unlock_broker_vault_token_env_var_effective)
          }}
      no_log: true

    - name: Assert Vault seed variables are set
      ansible.builtin.assert:
        that:
          - remote_unlock_broker_vault_addr | length > 0
          - remote_unlock_broker_vault_token_effective | length > 0
          - remote_unlock_broker_vault_kv_mount | length > 0
          - remote_unlock_broker_vault_kv_prefix | length > 0
          - remote_unlock_device_id | length > 0
          - remote_unlock_vault_secret_field | length > 0
          - remote_unlock_vault_secret_value is defined
          - remote_unlock_vault_secret_value | string | length > 0
        fail_msg: >-
          Set remote_unlock_device_id and remote_unlock_vault_secret_value, and
          ensure the broker Vault settings are present in the inventory and that
          a Vault token is provided via remote_unlock_broker_vault_token or the
          {{ remote_unlock_broker_vault_token_env_var_effective }} environment variable.

    - name: Read the current Vault secret document
      ansible.builtin.uri:
        url: "{{ remote_unlock_vault_secret_api_url }}"
        method: GET
        headers:
          X-Vault-Token: "{{ remote_unlock_broker_vault_token_effective }}"
        return_content: true
        status_code:
          - 200
          - 404
      register: remote_unlock_vault_secret_current
      no_log: true

    - name: Compute the current Vault secret document payload
      ansible.builtin.set_fact:
        remote_unlock_vault_secret_current_data: >-
          {{
            remote_unlock_vault_secret_current.json.data.data
            if (
              remote_unlock_vault_secret_current.status == 200
              and remote_unlock_vault_secret_current.json is defined
              and remote_unlock_vault_secret_current.json.data is defined
              and remote_unlock_vault_secret_current.json.data.data is defined
            )
            else {}
          }}

    - name: Compute whether the requested Vault secret field already exists
      ansible.builtin.set_fact:
        remote_unlock_vault_secret_field_exists: >-
          {{
            remote_unlock_vault_secret_current.status == 200
            and (remote_unlock_vault_secret_field in remote_unlock_vault_secret_current_data)
          }}

    - name: Read the existing Vault secret value when present
      ansible.builtin.set_fact:
        remote_unlock_vault_secret_existing_value: >-
          {{
            remote_unlock_vault_secret_current_data.get(remote_unlock_vault_secret_field)
            if remote_unlock_vault_secret_field_exists
            else None
          }}

    - name: Compute whether the current Vault secret already matches the requested value
      ansible.builtin.set_fact:
        remote_unlock_vault_secret_matches_requested: >-
          {{
            remote_unlock_vault_secret_field_exists
            and (remote_unlock_vault_secret_existing_value | string) == (remote_unlock_vault_secret_value | string)
          }}

    - name: Refuse to overwrite a different Vault secret without explicit confirmation
      ansible.builtin.assert:
        that:
          - >-
            (not remote_unlock_vault_secret_field_exists)
            or remote_unlock_vault_secret_matches_requested
            or remote_unlock_vault_secret_force | bool
        fail_msg: >-
          A different Vault secret already exists at
          {{ remote_unlock_broker_vault_kv_mount }}/{{ remote_unlock_broker_vault_kv_prefix }}/{{ remote_unlock_device_id }}
          for field {{ remote_unlock_vault_secret_field }}.
          Re-run with remote_unlock_vault_secret_force=true only after explicit operator confirmation.

    - name: Write the remote unlock secret into Vault
      ansible.builtin.uri:
        url: "{{ remote_unlock_vault_secret_api_url }}"
        method: POST
        headers:
          X-Vault-Token: "{{ remote_unlock_broker_vault_token_effective }}"
        body_format: json
        body:
          data: "{{ remote_unlock_vault_secret_payload }}"
        status_code:
          - 200
          - 204
      register: remote_unlock_vault_secret_write
      when: >-
        (not remote_unlock_vault_secret_field_exists)
        or (
          (not remote_unlock_vault_secret_matches_requested)
          and remote_unlock_vault_secret_force | bool
        )
      no_log: true

    - name: Re-read the Vault secret document after write
      ansible.builtin.uri:
        url: "{{ remote_unlock_vault_secret_api_url }}"
        method: GET
        headers:
          X-Vault-Token: "{{ remote_unlock_broker_vault_token_effective }}"
        return_content: true
        status_code: 200
      register: remote_unlock_vault_secret_verify
      no_log: true

    - name: Assert the expected secret field exists in Vault
      ansible.builtin.assert:
        that:
          - remote_unlock_vault_secret_verify.json.data.data is defined
          - remote_unlock_vault_secret_field in remote_unlock_vault_secret_verify.json.data.data
        fail_msg: >-
          Vault responded but the secret field was not present at
          {{ remote_unlock_broker_vault_kv_mount }}/{{ remote_unlock_broker_vault_kv_prefix }}/{{ remote_unlock_device_id }}.
          Returned fields:
          {{ remote_unlock_vault_secret_verify.json.data.data.keys() | list | join(', ') }}

    - name: Report the Vault seed result
      ansible.builtin.debug:
        msg:
          - >-
            Vault path:
            {{ remote_unlock_broker_vault_kv_mount }}/{{ remote_unlock_broker_vault_kv_prefix }}/{{ remote_unlock_device_id }}
          - "Field present: {{ remote_unlock_vault_secret_field }}"
          - >-
            Secret existed before write:
            {{ 'yes' if remote_unlock_vault_secret_field_exists else 'no' }}
          - >-
            Existing value already matched:
            {{ 'yes' if remote_unlock_vault_secret_matches_requested else 'no' }}
          - >-
            Overwrite confirmed:
            {{ 'yes' if remote_unlock_vault_secret_force | bool else 'no' }}
