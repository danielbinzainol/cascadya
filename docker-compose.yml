services:
  backoffice:
    build:
      context: .
      dockerfile: Dockerfile
    image: c-market-backoffice:latest
    container_name: c-market-backoffice
    restart: unless-stopped
    depends_on: 
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL = "postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/forecast_database"



  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    expose:
      - 5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=forecast_database

volumes:
  postgres_data:      