<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backoffice Home</title>
    <link rel="icon" type="image/svg+xml" href="/static/forecasts/assets/logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/forecasts/assets/logo.png" />
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f6f4ef;
        color: #201e1c;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }
      h1 {
        margin: 0 0 0.3rem;
      }
      p {
        color: #5b564f;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 0.8rem;
        margin-top: 1rem;
      }
      a.card {
        display: block;
        border: 1px solid #d4cab9;
        background: #fffefb;
        border-radius: 14px;
        padding: 0.9rem;
        color: inherit;
        text-decoration: none;
      }
      a.card:hover {
        background: #f3fcfd;
      }
      small {
        color: #6f6a63;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Backoffice Home</h1>
      <p>Entry points for available tabs and APIs.</p>
      <div class="grid">
        <a class="card" href="/forecasts/tab">
          <strong>Forecasts Tab</strong><br />
          <small>Run and review forecast jobs.</small>
        </a>
        <a class="card" href="/docs">
          <strong>API Docs</strong><br />
          <small>Open FastAPI swagger for all endpoints.</small>
        </a>
      </div>
    </main>
  </body>
</html>
