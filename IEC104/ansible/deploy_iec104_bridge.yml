---
# =============================================================================
# deploy_iec104_bridge.yml
#
# Deploys the IEC 104 ↔ NATS bridge as a Docker container on a base Debian host.
#
# Usage:
#   ansible-playbook deploy_iec104_bridge.yml -i inventory.yml
#   ansible-playbook deploy_iec104_bridge.yml -i inventory.yml --tags docker
#   ansible-playbook deploy_iec104_bridge.yml -i inventory.yml --tags deploy
#
# Tags:
#   docker   – install Docker engine only
#   deploy   – build and start the containers only
#   certs    – copy TLS certificates only
# =============================================================================

- name: Deploy IEC 104 ↔ NATS bridge
  hosts: iec104_bridge
  become: true
  vars:
    # ── deployment target ────────────────────────────────────────────────────
    app_dir: /opt/iec104-bridge          # directory on the remote host
    app_user: iec104                     # non-root user that owns the app

    # ── Docker ───────────────────────────────────────────────────────────────
    docker_compose_version: "2.27.0"     # Docker Compose plugin version

    # ── IEC 104 server config ────────────────────────────────────────────────
    iec104_bind_ip:    "0.0.0.0"
    iec104_port:       2404
    iec104_ca:         1

    # ── NATS config ──────────────────────────────────────────────────────────
    nats_url:          "tls://broker-DEV1-S.cascadya.local:4222"
    nats_subject_pfx:  "aFRR.down"
    nats_tls_enabled:  "true"
    nats_tls_ca:       "/certs/ca.crt"
    nats_tls_cert:     "/certs/client.crt"
    nats_tls_key:      "/certs/client.key"

    # ── TLS certificates (local paths, only used if nats_tls_enabled=true) ──
    local_certs_dir:   "{{ playbook_dir }}/certs"

    # ── system ───────────────────────────────────────────────────────────────
    timezone: Europe/Paris

    # ── logging ──────────────────────────────────────────────────────────────
    log_level: "INFO"

  # ── handlers ───────────────────────────────────────────────────────────────
  handlers:
    - name: restart bridge
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        recreate: always

  # ── tasks ───────────────────────────────────────────────────────────────────
  tasks:

    # ── 0. Connectivity check ───────────────────────────────────────────────
    - name: Check internet connectivity
      ansible.builtin.command:
        cmd: ping -c 2 -W 3 8.8.8.8
      register: ping_check
      failed_when: false
      changed_when: false
      become: false
      tags: [docker, deploy]

    - name: Abort if no internet access
      ansible.builtin.fail:
        msg: "Target host has no internet access – ping 8.8.8.8 failed"
      when: ping_check.rc != 0
      tags: [docker, deploy]

    # ── 1. Set timezone ─────────────────────────────────────────────────────
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"
      tags: [docker, deploy]

    # ── 3. Force HTTPS for apt repos ────────────────────────────────────────
    - name: Switch sources.list to HTTPS
      ansible.builtin.replace:
        path: /etc/apt/sources.list
        regexp: 'http://'
        replace: 'https://'
      tags: [docker, deploy]

    - name: Switch sources.list.d to HTTPS
      ansible.builtin.shell:
        cmd: "sed -i 's|http://|https://|g' /etc/apt/sources.list.d/*.list"
      failed_when: false
      changed_when: false
      tags: [docker, deploy]

    # ── 5. Disable unattended-upgrades to avoid apt lock ────────────────────
    - name: Disable unattended-upgrades
      ansible.builtin.systemd:
        name: unattended-upgrades
        enabled: false
        state: stopped
      failed_when: false
      tags: [docker, deploy]

    - name: Wait for apt lock to be released
      ansible.builtin.shell:
        cmd: while lsof /var/lib/dpkg/lock-frontend > /dev/null 2>&1; do sleep 2; done
      changed_when: false
      timeout: 120
      tags: [docker, deploy]

    # ── 6. System prerequisites ─────────────────────────────────────────────
    - name: Install system prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
        state: present
        update_cache: true
      tags: [docker]

    # ── 7. Docker APT repository ────────────────────────────────────────────
    - name: Remove conflicting Docker repo files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/keyrings/docker.gpg
        - /etc/apt/keyrings/docker.asc
      tags: [docker]

    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: [docker]

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: [docker]

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/debian
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
      tags: [docker]

    # ── 8. Install Docker engine ────────────────────────────────────────────
    - name: Install Docker engine and plugins
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      tags: [docker]

    - name: Ensure Docker service is enabled and started
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      tags: [docker]

    - name: Install Python Docker SDK (for Ansible Docker modules)
      ansible.builtin.apt:
        name:
          - python3-docker
        state: present
        update_cache: false
      tags: [docker]

    # ── 9. App user & directory ─────────────────────────────────────────────
    - name: Create app user
      ansible.builtin.user:
        name: "{{ app_user }}"
        groups: docker
        append: true
        shell: /usr/sbin/nologin
        create_home: false
        system: true
      tags: [deploy]

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"
      tags: [deploy]

    # ── 10. Copy application files ───────────────────────────────────────────
    - name: Copy server.py
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../src/server.py"
        dest: "{{ app_dir }}/server.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"
      notify: restart bridge
      tags: [deploy]

    - name: Copy requirements.txt
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../src/requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"
      notify: restart bridge
      tags: [deploy]

    - name: Copy Dockerfile
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../src/Dockerfile"
        dest: "{{ app_dir }}/Dockerfile"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"
      notify: restart bridge
      tags: [deploy]

    # ── 11. TLS certificates (optional) ─────────────────────────────────────
    - name: Create certs directory
      ansible.builtin.file:
        path: "{{ app_dir }}/certs"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0700"
      when: nats_tls_enabled == "true"
      tags: [deploy, certs]

    - name: Copy TLS certificates
      ansible.builtin.copy:
        src: "{{ local_certs_dir }}/"
        dest: "{{ app_dir }}/certs/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
      when: nats_tls_enabled == "true"
      notify: restart bridge
      tags: [deploy, certs]

    # ── 12. Generate docker-compose.yml from template ────────────────────────
    - name: Template docker-compose.yml
      ansible.builtin.template:
        src: "{{ playbook_dir }}/docker-compose.yml.j2"
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"
      notify: restart bridge
      tags: [deploy]

    # ── 13. Build and start containers ───────────────────────────────────────
    - name: Build and start containers
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        build: always
        state: present
      tags: [deploy]

    # ── 14. Verify bridge is running ─────────────────────────────────────────
    - name: Confirm bridge container is running
      community.docker.docker_container_info:
        name: iec104-bridge
      register: bridge_info
      tags: [deploy]

    - name: Print bridge status
      ansible.builtin.debug:
        msg: "Bridge container state: {{ bridge_info.container.State.Status }}"
      tags: [deploy]