---
- name: Install WireGuard packages
  ansible.builtin.apt:
    name: "{{ wireguard_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install optional debug packages
  ansible.builtin.apt:
    name: "{{ wireguard_debug_packages }}"
    state: present
  when: wireguard_debug_tools_enabled | bool
