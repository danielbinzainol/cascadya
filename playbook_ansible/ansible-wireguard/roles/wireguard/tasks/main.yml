---
- name: Install packages
  ansible.builtin.include_tasks: install.yml

- name: Configure WireGuard
  ansible.builtin.include_tasks: configure.yml

- name: Configure internal dnsmasq
  ansible.builtin.include_tasks: dns.yml
  when: wireguard_manage_dnsmasq | bool

- name: Configure routing and firewall
  ansible.builtin.include_tasks: firewall.yml
  when: wireguard_manage_firewall_rules | bool

- name: Flush handlers before verification
  ansible.builtin.meta: flush_handlers

- name: Verify deployment
  ansible.builtin.include_tasks: verify.yml
  when: wireguard_run_verify | bool
