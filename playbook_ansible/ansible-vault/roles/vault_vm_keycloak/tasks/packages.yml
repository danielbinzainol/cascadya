---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Check whether docker is already installed
  ansible.builtin.command: docker --version
  register: vault_vm_keycloak_docker_check
  changed_when: false
  failed_when: false

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ vault_vm_keycloak_apt_packages_common }}"
    state: present

- name: Install docker when it is not already present
  ansible.builtin.apt:
    name: "{{ vault_vm_keycloak_apt_packages_docker }}"
    state: present
  when: vault_vm_keycloak_docker_check.rc != 0

- name: Install nginx when it is the selected proxy
  ansible.builtin.apt:
    name: "{{ vault_vm_keycloak_apt_packages_nginx }}"
    state: present
  when: vault_vm_keycloak_proxy_mode == 'nginx'

- name: Ensure docker is enabled and started
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Ensure nginx is enabled and started
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
  when: vault_vm_keycloak_proxy_mode == 'nginx'
