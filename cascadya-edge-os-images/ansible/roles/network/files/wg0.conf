[Interface]
# The private IP address of this device in the VPN
Address = 10.x.x.x/32
# The Private Key you find in Vault (NEVER share this)
PrivateKey = <PASTE_YOUR_PRIVATE_KEY_FROM_VAULT_HERE>

[Peer]
# The Public Key of the VPN Server (Broker)
PublicKey = <PASTE_SERVER_PUBLIC_KEY_FROM_VAULT_HERE>
# The public IP:Port of your cloud broker
Endpoint = vpn.cascadya.com:51820
# IPs allowed to be routed through the VPN (usually the internal subnet)
AllowedIPs = 10.0.0.0/8
# Keep the connection alive (important for NAT traversal)
PersistentKeepalive = 25