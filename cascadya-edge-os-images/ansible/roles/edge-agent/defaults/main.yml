---
edge_agent_app_dir: "{{ cascadya_data_dir }}/agent"
edge_agent_certs_dir: "{{ edge_agent_app_dir }}/certs"
edge_agent_venv_dir: "{{ cascadya_data_dir }}/venv"
edge_agent_systemd_dir: /etc/systemd/system
edge_agent_service_user: "{{ target_user }}"

edge_agent_apt_packages:
  - python3
  - python3-pip
  - python3-venv

edge_agent_virtualenv_command: python3 -m venv

edge_agent_modbus_host: "192.168.50.2"
edge_agent_modbus_port: 502
edge_agent_nats_url: "tls://100.103.71.126:4222"
edge_agent_nats_telemetry_subject: "cascadya.telemetry.live"
edge_agent_nats_command_subject: "cascadya.routing.command"
edge_agent_nats_ping_subject: "cascadya.routing.ping"

edge_agent_directories:
  - path: "{{ edge_agent_app_dir }}"
    mode: "0750"
  - path: "{{ edge_agent_certs_dir }}"
    mode: "0700"
  - path: "{{ edge_agent_venv_dir }}"
    mode: "0750"

edge_agent_source_files:
  - gateway_modbus_sbc.py
  - models.py
  - telemetry_publisher.py

edge_agent_services:
  - gateway_modbus
  - telemetry_publisher

edge_agent_legacy_services:
  - cascadya-agent.service
  - cascadya-gateway.service
  - cascadya-telemetry.service

edge_agent_dynamic_cert_specs:
  - filename: client.crt
    mode: "0600"
  - filename: client.key
    mode: "0600"

edge_agent_local_cert_dir: >-
  {{ playbook_dir }}/.tmp/cascadya-edge-agent/{{ inventory_hostname }}
