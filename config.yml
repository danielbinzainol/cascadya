france_champignon:
  data: 
    path: 'data\france_champignon\data_bonduelle.csv'
    frequency: 'h'
    timezone: 'CET' # ou CEST, je ne sais pas, pas 'Europe/Paris'
    timestamp_col: 'date/heure 2024'
    timestamp_format: 'DD/MM/YYYY HH:mm'
    hour_change_strategy: 'Not relevant for this timezone'

inariz:
  data: 
    path: 'data\inariz\raw\Graphique_20260121150818.csv'
    skiprows: 4
    usecols: ["Horodatage","Valeur","Unité"]
    timezone: 'Europe/Paris'
    timestamp_col: 'Horodatage'
    timestamp_format: 'YYYY-MM-DD HH:mm:ss.fff'
    hour_change_strategy: 'March: visible, one day with 23 hours. October: visible in boiler-box with 25 hours, the last value before the hour change is persisted for an hour.'

tarkett:
  data:
    path: 'D:\Cascadya\Cascadya - Documents\08. COMPTE CLIENT\Tarkett_Sedan\2. Données sous NDA\Données de Consommation gaz 2025'
    timezone: 'Europe/Paris'
    timestamp_col: 'Valeur mesurée le'
    timestamp_format: 'DD/MM/YYYY HH:mm:ss'
    hour_change_strategy: 'Invisible, in data gaps'



models:
  LinearRegression:
    params:
      fit_intercept: False